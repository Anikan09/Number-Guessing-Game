<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>Number Guessing Game</header>
    <div class="cont">
        <h1 id="headline">Guess the Number!</h1>
        <h2 id="displayTries">Tries: 0</h2>
        <h2 id="correct">Correct: 0</h2>
        <form onsubmit="guessTheNumber(); return false;">
        <input id="myNumber" type="number" required placeholder="Enter a number ...">
        <button>Guess!</button>
        </form>
    </div>


    <script src="script.js"></script>
</body>

</html>
